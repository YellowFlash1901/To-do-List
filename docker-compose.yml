version: '3.8'

services:
  fastapi:
    build: ./
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "80:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    env_file: .env
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    depends_on:
      - fastapi
    volumes:
      - ./frontend:/app
      - /app/node_modules

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080